<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <title>Message Sent</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            background: #0d1117;
            color: #ffffff;
            font-family: 'Inter', sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            text-align: center;
        }

        .box {
            background: #161b22;
            padding: 60px 50px;
            border-radius: 25px;
            border: 1px solid #30363d;
            max-width: 500px;
        }

        .mail-icon {
            width: 130px;
            height: 130px;

            margin: 0 auto 30px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;

            background: rgba(88, 166, 255, 0.1);
            border: 2px solid #58a6ff;

            animation: float 2s ease-in-out infinite;
        }

        .mail-icon i {
            font-size: 65px;
            color: #58a6ff;

            animation: fly 2s ease-in-out infinite;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 20px;
            font-size: 42px;
        }

        p {
            color: #c9d1d9;
            margin-bottom: 35px;
            line-height: 1.8;
            font-size: 18px;
        }

        a {
            display: inline-block;
            padding: 14px 32px;

            background: #58a6ff;
            color: white;

            text-decoration: none;
            border-radius: 12px;

            transition: 0.3s;
            font-weight: 600;
        }

        a:hover {
            background: #1f6feb;
            transform: translateY(-3px);
        }

        @keyframes float {

            0% {
                transform: translateY(0px);
                box-shadow: 0 0 0 rgba(88, 166, 255, 0.4);
            }

            50% {
                transform: translateY(-12px);
                box-shadow: 0 15px 30px rgba(88, 166, 255, 0.2);
            }

            100% {
                transform: translateY(0px);
                box-shadow: 0 0 0 rgba(88, 166, 255, 0.4);
            }

        }

        @keyframes fly {

            0% {
                transform: rotate(-10deg);
            }

            50% {
                transform: rotate(10deg);
            }

            100% {
                transform: rotate(-10deg);
            }

        }

    </style>

</head>

<body>

    <div class="box">

        <div class="mail-icon">
        <i class="bi bi-envelope-check-fill"></i>
        </div>

        <h1>Message Sent</h1>

        <p>
            Thank you for contacting me.
            I will get back to you soon.
        </p>

        <a href="index.html">
            Back to Home
        </a>

    </div>

</body>

</html>
